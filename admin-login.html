<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | GYM 6O9</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { background: var(--background); }
    .login-container {
      max-width: 450px;
      margin: 120px auto 60px;
      padding: 40px;
      background: var(--surface);
      border: 1px solid var(--primary);
      border-radius: 12px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="login-container">
      <h2 style="color: var(--primary); margin-bottom: 10px;">Admin Access</h2>
      <p class="text-muted" style="margin-bottom: 30px;">Authorized personnel only</p>
      
      <form id="adminLoginForm" class="form-container" style="text-align: left; padding: 0; border: none; background: transparent;">
        <div class="form-group" style="margin-bottom: 30px;">
          <label class="form-label">Admin Password</label>
          <input type="password" id="password" class="form-input" required placeholder="Enter master password">
        </div>
        
        <button type="submit" id="loginBtn" class="btn btn-primary" style="width: 100%;">Access Dashboard</button>
      </form>
    </div>
  </div>

  <script>
    document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      
      btn.innerText = 'Verifying...';
      btn.disabled = true;

      try {
        const res = await fetch('http://localhost:3000/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        const data = await res.json();
        
        if (data.success) {
          localStorage.setItem('gym6o9_admin_token', data.token);
          window.location.href = 'admin.html';
        } else {
          alert('Incorrect Password');
          btn.innerText = 'Access Dashboard';
          btn.disabled = false;
        }
      } catch (err) {
        console.error(err);
        alert('Server Error');
        btn.innerText = 'Access Dashboard';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
