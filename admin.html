<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | GYM 6O9</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { padding-top: 60px; }
  </style>
  <script>
    if (!localStorage.getItem('gym6o9_admin_token')) {
      window.location.href = 'admin-login.html';
    }
    function logoutAdmin() {
      localStorage.removeItem('gym6o9_admin_token');
      window.location.href = 'admin-login.html';
    }
  </script>
</head>
<body>

  <div class="container">
    <div class="flex-between" style="margin-bottom: 20px;">
      <a href="index.html" style="color: var(--text-muted); text-decoration: none; font-size: 0.875rem; font-weight: bold; text-transform: uppercase;">&larr; Back to Site</a>
      <button onclick="logoutAdmin()" class="btn btn-outline" style="padding: 6px 12px; font-size: 0.875rem;">Logout</button>
    </div>
    
    <h1 style="font-size: clamp(2rem, 4vw, 3rem); margin-bottom: 10px;">Admin Dashboard</h1>
    <div class="section-divider" style="margin: 0 0 40px 0;"></div>

    <!-- Active Members Section -->
    <div class="table-container" style="margin-bottom: 40px;">
      <div class="flex-between" style="padding: 24px; border-bottom: 1px solid var(--surface-border); flex-wrap: wrap; gap: 15px;">
        <h2 style="font-size: 1.25rem;">Active Members</h2>
        
        <div style="display: flex; gap: 15px; align-items: center;">
          <select id="memberFilter" class="form-input" style="padding: 6px 12px; width: auto; font-size: 0.9rem;">
            <option value="all">All Members</option>
            <option value="expiring-3">Expiring in 3 Days</option>
            <option value="expired">Already Expired</option>
          </select>
          
          <span style="background: rgba(255,255,255,0.1); padding: 6px 12px; border-radius: 20px; font-size: 0.875rem; font-weight: bold;">
            Total: <span id="totalMembers">Loading...</span>
          </span>
        </div>
      </div>

      <div style="overflow-x: auto;">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Phone</th>
              <th>Plan</th>
              <th>Expiry Date</th>
              <th>Days Left</th>
              <th style="text-align: right;">Action</th>
            </tr>
          </thead>
          <tbody id="membersTableBody">
            <tr>
              <td colspan="7" style="text-align: center; color: var(--text-muted); padding: 40px;">Fetching records...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Pricing Editor Section -->
    <div class="table-container" style="margin-bottom: 40px; padding: 24px;">
      <h2 style="font-size: 1.25rem; margin-bottom: 20px;">Manage Pricing</h2>
      <div class="plan-grid">
        <div class="form-group">
          <label class="form-label">1 Month Plan Price</label>
          <input type="text" id="price-1m" class="form-input" placeholder="e.g. ₹1,000">
        </div>
        <div class="form-group">
          <label class="form-label">3 Months Plan Price</label>
          <input type="text" id="price-3m" class="form-input" placeholder="e.g. ₹2,999">
        </div>
        <div class="form-group">
          <label class="form-label">6 Months Plan Price</label>
          <input type="text" id="price-6m" class="form-input" placeholder="e.g. ₹5,499">
        </div>
        <div class="form-group">
          <label class="form-label">1 Year Plan Price</label>
          <input type="text" id="price-1y" class="form-input" placeholder="e.g. ₹9,999">
        </div>
      </div>
      <button id="savePricesBtn" class="btn btn-primary" style="margin-top: 10px;">Save New Prices</button>
    </div>

    <!-- Features Editor Section -->
    <div class="table-container" style="margin-bottom: 40px; padding: 24px;">
      <h2 style="font-size: 1.25rem; margin-bottom: 20px;">Manage Plan Features</h2>
      <p class="text-muted" style="margin-bottom: 20px;">Type each feature on a new line (press Enter). They will be automatically converted into bullet points on the website.</p>
      <div class="plan-grid">
        <div class="form-group">
          <label class="form-label">1 Month Plan Features</label>
          <textarea id="features-1m-input" class="form-input" placeholder="Features (one per line)" rows="4"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">3 Months Plan Features</label>
          <textarea id="features-3m-input" class="form-input" placeholder="Features (one per line)" rows="4"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">6 Months Plan Features</label>
          <textarea id="features-6m-input" class="form-input" placeholder="Features (one per line)" rows="4"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">1 Year Plan Features</label>
          <textarea id="features-1y-input" class="form-input" placeholder="Features (one per line)" rows="4"></textarea>
        </div>
      </div>
      <button id="saveFeaturesBtn" class="btn btn-primary" style="margin-top: 10px;">Save New Features</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
